<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacy Dashboard – GramHealth</title>
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .search-section {
      background: white;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .search-box {
      display: flex;
      gap: 10px;
      margin: 15px 0;
      flex-wrap: wrap;
    }
    .search-box input {
      flex: 1;
      min-width: 200px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
    }
    .pharmacy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .pharmacy-card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid var(--border);
      transition: all 0.2s;
    }
    .pharmacy-card:hover {
      box-shadow: 0 4px 12px rgba(22,163,74,0.1);
      border-color: var(--primary);
    }
    .pharmacy-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 8px;
    }
    .pharmacy-address {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pharmacy-distance {
      font-size: 0.9rem;
      color: var(--gray-700);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .pharmacy-hours {
      font-size: 0.85rem;
      color: var(--gray-600);
      margin-bottom: 8px;
      padding: 4px 0;
    }
    .pharmacy-phone {
      font-size: 0.9rem;
      color: var(--gray-800);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-icon {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error-message {
      background: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 8px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-brand">🏥 Gram<span class="dot">Health</span></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <span id="user-name" style="font-size:0.82rem;color:var(--text-muted);"></span>
      <button onclick="Auth.logout()" style="background:none;border:none;cursor:pointer;font-size:0.82rem;color:var(--text-muted);">Logout</button>
    </div>
  </nav>

  <div class="content" style="max-width:1200px;margin:0 auto;padding:20px;">
    <h1 style="font-family:'Fraunces',serif; margin-bottom: 5px;">💊 Pharmacy Locator</h1>
    <p style="color:var(--text-muted); margin-bottom: 30px;">Find medicines and pharmacies near you</p>

    <!-- Search Section -->
    <div class="search-section">
      <h3>🔍 Search for pharmacies</h3>
      <div class="search-box">
        <input type="text" id="location-input" placeholder="Enter village, town, or city (e.g., Nabha, Punjab)" value="Nabha, Punjab">
        <button class="btn btn-primary" onclick="searchPharmacies()">Search</button>
        <button class="btn btn-outline" onclick="useMyLocation()">📍 Use my location</button>
      </div>
      <div id="search-status"></div>
    </div>

    <!-- Results Container -->
    <div id="results-container"></div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // 🔑 Your Gemini API key (already inserted)
    const GEMINI_API_KEY = 'AIzaSyAnLpzyymvkRyuLG3lMtf9qzxiS2NqufpU';

    // DOM elements
    const locationInput = document.getElementById('location-input');
    const searchStatus = document.getElementById('search-status');
    const resultsContainer = document.getElementById('results-container');

    // Display logged-in user's name
    document.addEventListener('DOMContentLoaded', () => {
      const user = Auth.user;
      if (user) {
        document.getElementById('user-name').textContent = user.name;
      }
      // Auto-search on load
      searchPharmacies();
    });

    // Show/hide loading
    function setLoading(isLoading, message = 'Searching for pharmacies...') {
      if (isLoading) {
        searchStatus.innerHTML = `
          <div class="loading">
            <div class="spinner"></div>
            <p>${message}</p>
          </div>
        `;
        resultsContainer.innerHTML = '';
      } else {
        searchStatus.innerHTML = '';
      }
    }

    function showError(message) {
      searchStatus.innerHTML = `<div class="error-message">❌ ${message}</div>`;
    }

    async function searchPharmacies(locationOverride) {
      const location = locationOverride || locationInput.value.trim();
      if (!location) {
        showError('Please enter a location.');
        return;
      }

      setLoading(true, `Searching pharmacies near "${location}"...`);

      try {
        const pharmacies = await fetchPharmaciesFromGemini(location);
        displayPharmacies(pharmacies, location);
      } catch (error) {
        console.error('Search error:', error);
        showError(error.message || 'Failed to search pharmacies. Please try again.');
      } finally {
        setLoading(false);
      }
    }

    function useMyLocation() {
      if (!navigator.geolocation) {
        showError('Geolocation is not supported by your browser.');
        return;
      }

      setLoading(true, 'Getting your location...');

      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;
          const locationString = `${latitude},${longitude}`;
          await searchPharmacies(locationString);
        },
        (error) => {
          setLoading(false);
          let msg = 'Unable to get your location. ';
          switch (error.code) {
            case error.PERMISSION_DENIED:
              msg += 'Please allow location access or enter manually.';
              break;
            case error.POSITION_UNAVAILABLE:
              msg += 'Location information unavailable.';
              break;
            case error.TIMEOUT:
              msg += 'Location request timed out.';
              break;
            default:
              msg += 'Unknown error.';
          }
          showError(msg);
        }
      );
    }

    async function fetchPharmaciesFromGemini(location) {
      const prompt = `You are a helpful assistant that finds pharmacy information using Google Maps.
Find up to 8 pharmacies near "${location}". For each pharmacy, provide the following details in a JSON array:
- name (string)
- address (string)
- distance (string, e.g., "1.2 km")
- phone (string, if available, else "Not available")
- hours (string, e.g., "Open today 9 AM - 9 PM" or "Hours not specified")
- rating (number, optional, if available)

Return ONLY a valid JSON object with a key "pharmacies" containing the array. Do not include any other text.`;

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [{ text: prompt }]
          }],
          tools: [{ google_maps: {} }]
        })
      });

      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.error?.message || 'API request failed');
      }

      const data = await response.json();
      const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!aiText) throw new Error('No response from AI');

      // Extract JSON
      const jsonMatch = aiText.match(/```json\n([\s\S]*?)\n```/) || aiText.match(/\[\s*\{.*\}\s*\]/s);
      let pharmacies = [];
      if (jsonMatch) {
        pharmacies = JSON.parse(jsonMatch[1] || jsonMatch[0]);
      } else {
        pharmacies = JSON.parse(aiText);
      }

      if (pharmacies.pharmacies) pharmacies = pharmacies.pharmacies;
      return pharmacies;
    }

    function displayPharmacies(pharmacies, location) {
      if (!pharmacies || pharmacies.length === 0) {
        resultsContainer.innerHTML = `<p class="text-muted" style="text-align:center; padding:40px;">No pharmacies found near "${location}". Try a different location.</p>`;
        return;
      }

      const html = `
        <h2 style="margin-bottom:20px;">📌 Pharmacies near ${location}</h2>
        <div class="pharmacy-grid">
          ${pharmacies.map(p => `
            <div class="pharmacy-card">
              <div class="pharmacy-name">${p.name || 'Unnamed Pharmacy'}</div>
              <div class="pharmacy-address">
                <span>📍</span> ${p.address || 'Address not available'}
              </div>
              <div class="pharmacy-distance">
                <span>📏</span> ${p.distance || 'Distance unknown'}
              </div>
              ${p.hours ? `
              <div class="pharmacy-hours">
                <span>🕒</span> ${p.hours}
              </div>` : ''}
              ${p.phone && p.phone !== 'Not available' ? `
              <div class="pharmacy-phone">
                <span>📞</span> <a href="tel:${p.phone}">${p.phone}</a>
              </div>` : ''}
              ${p.rating ? `
              <div style="font-size:0.9rem; color:#f59e0b;">⭐ ${p.rating} / 5</div>` : ''}
            </div>
          `).join('')}
        </div>
      `;

      resultsContainer.innerHTML = html;
    }
  </script>
</body>
</html>
